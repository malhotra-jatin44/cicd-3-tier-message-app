name: Basic CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  # ==========================================================
  # Backend CI
  # ==========================================================

  backend-ci:

    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci

      - name: Lint Backend
        working-directory: backend
        run: npm run lint

      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-backend:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================
  # Frontend CI
  # ==========================================================

  frontend-ci:

    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-frontend:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================
  # GitOps Updates
  # ==========================================================

  gitops-update:

    needs:
      - backend-ci
      - frontend-ci

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        # with:
        #   token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Backend Image Tag
        run: |
          sed -i 's|tag:.*|tag: "${{ github.sha }}"|' \
          k8s/backend-chart/values.yaml

      - name: Update Frontend Image Tag
        run: |
          sed -i 's|tag:.*|tag: "${{ github.sha }}"|' \
          k8s/frontend-chart/values.yaml

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Update image tags to ${{ github.sha }} [skip ci]" || exit 0

          git push