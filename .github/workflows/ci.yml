name: Basic CI

on:
  push:
    branches:
      # - develop
      - main

  pull_request:

jobs:
  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
        
      - name: Login To DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
            npm ci
            docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-backend:${{ github.sha }} \
            .

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      # - name: Run Backend Tests test
      #   working-directory: backend
      #   run: npm test

      # - name: Run Frontend Tests
      #   working-directory: frontend
      #   run: npm test -- --watchAll=false

      # - name: Build Backend
      #   working-directory: backend
      #   run: npm run build

      - name: Build Frontend & Frontend Image
        working-directory: frontend
        run: |
          npm run build
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-frontend:${{ github.sha }} \
          .


      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-backend:${{ github.sha }}
          docker push \
          ${{ secrets.DOCKERHUB_USERNAME }}/messaging-app-frontend:${{ github.sha }}